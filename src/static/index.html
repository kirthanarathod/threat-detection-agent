<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Detection Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-animate"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">🛡️ Threat Detection Agent</h1>
                <p class="subtitle">AI-Powered Security Alert Analysis</p>
            </div>
            <div class="header-status">
                <span class="pulse"></span>
                <span>System Online</span>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="dashboard-grid">
            <!-- Left: Stats & Form -->
            <div class="col-left">
                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-icon">📊</span>
                        <span class="stat-label">Total</span>
                        <span class="stat-number" id="totalAlerts">0</span>
                    </div>
                    <div class="stat-box critical">
                        <span class="stat-icon">🔴</span>
                        <span class="stat-label">Critical</span>
                        <span class="stat-number" id="criticalCount">0</span>
                    </div>
                    <div class="stat-box high">
                        <span class="stat-icon">🟠</span>
                        <span class="stat-label">High</span>
                        <span class="stat-number" id="highCount">0</span>
                    </div>
                    <div class="stat-box medium">
                        <span class="stat-icon">🟡</span>
                        <span class="stat-label">Medium</span>
                        <span class="stat-number" id="mediumCount">0</span>
                    </div>
                </div>

                <!-- Form -->
                <div class="glass-card form-card">
                    <h2>New Alert</h2>
                    <form id="alertForm">
                        <div class="form-row">
                            <input type="text" id="alertId" placeholder="Alert ID" required>
                            <select id="source" required>
                                <option value="">Source</option>
                                <option value="EDR">EDR</option>
                                <option value="Firewall">Firewall</option>
                                <option value="IDS">IDS</option>
                                <option value="SIEM">SIEM</option>
                                <option value="WAF">WAF</option>
                                <option value="CloudWatch">CloudWatch</option>
                                <option value="Sentinel">Sentinel</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <select id="eventType" required>
                                <option value="">Event Type</option>
                                <option value="privilege_escalation">Privilege Escalation</option>
                                <option value="lateral_movement">Lateral Movement</option>
                                <option value="data_exfiltration">Data Exfiltration</option>
                                <option value="malware_detection">Malware Detection</option>
                                <option value="suspicious_login">Suspicious Login</option>
                                <option value="unusual_activity">Unusual Activity</option>
                            </select>
                        </div>

                        <div class="severity-box">
                            <label>Severity</label>
                            <div class="severity-control">
                                <input type="range" id="severity" min="0" max="1" step="0.01" value="0.5">
                                <span id="severityValue">0.50</span>
                            </div>
                        </div>

                        <textarea id="description" placeholder="Describe the security event..." required></textarea>

                        <button type="submit" class="btn-submit">Analyze</button>
                    </form>
                </div>
            </div>

            <!-- Right: Results & History -->
            <div class="col-right">
                <!-- Result -->
                <div id="resultSection" class="glass-card result-card" style="display: none;">
                    <h2>✅ Analysis</h2>
                    <div id="resultCard"></div>
                </div>

                <!-- History -->
                <div class="glass-card history-card">
                    <div class="history-header">
                        <h2>Recent Decisions</h2>
                        <select id="threatFilter">
                            <option value="">All</option>
                            <option value="CRITICAL">Critical</option>
                            <option value="HIGH">High</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="LOW">Low</option>
                        </select>
                    </div>
                    <div id="decisionsList" class="decisions-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="errorMsg" class="toast" style="display: none;"></div>
    <script src="/static/app.js"></script>
</body>
</html>
